apiVersion: v1
kind: Namespace
metadata:
  name: ai-bot
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: ai-bot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-job-writer
  namespace: ai-bot
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-job-writer
  namespace: ai-bot
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: ai-bot
roleRef:
  kind: Role
  name: orchestrator-job-writer
  apiGroup: rbac.authorization.k8s.io
