apiVersion: batch/v1
kind: Job
metadata:
  name: ai-issue-codex-manual
  namespace: ai-bot
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: worker-codex:latest
          imagePullPolicy: Never
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: OPENAI_API_KEY
            - name: AI_PROVIDER
              value: "openai"
            # Ephemeral installation token (generate via GitHub App or use a PAT)
            - name: GITHUB_TOKEN
              value: "CHANGE_ME"
            # --- Fill in before running ---
            - name: GITHUB_REPO
              value: "CHANGE_ME"
            - name: GITHUB_ISSUE_NUMBER
              value: "CHANGE_ME"
            - name: GITHUB_INSTALLATION_ID
              value: "CHANGE_ME"
